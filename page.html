  <script>
    (function () {
      'use strict';

      var ALLOWED_PREFIXES = ['static-pages/', 'modules/'];
      var mdPath = '';
      var titleEl = document.getElementById('article-title');
      var summaryEl = document.getElementById('article-summary');
      var metaEl = document.getElementById('article-meta');
      var bodyEl = document.getElementById('article-body');

      function decodePath(rawPath) {
        try {
          return decodeURIComponent(rawPath || '');
        } catch (e) {
          return '';
        }
      }

      function normalizePath(path) {
        return String(path || '').trim().replace(/\\/g, '/').replace(/^\/+/, '');
      }

      function isAllowedPath(path) {
        if (!path) return false;
        if (path.indexOf('..') !== -1) return false;
        if (!path.endsWith('.md')) return false;
        return ALLOWED_PREFIXES.some(function (prefix) {
          return path.startsWith(prefix);
        });
      }

      function deriveTitleFromPath(path) {
        var file = path.split('/').pop() || '';
        var base = file.replace(/\.md$/, '').replace(/[-_]+/g, ' ').trim();
        if (!base) return 'Untitled';
        return base.replace(/\b\w/g, function (ch) { return ch.toUpperCase(); });
      }

      function escapeHtml(input) {
        return String(input || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function decodeEscapedText(input) {
        var text = document.createElement('textarea');
        text.innerHTML = String(input || '');
        return text.value;
      }

      function normalizeSegments(path) {
        var invalid = false;
        var stack = [];
        String(path || '').replace(/\\/g, '/').split('/').forEach(function (seg) {
          if (!seg || seg === '.') return;
          if (seg === '..') {
            if (!stack.length) {
              invalid = true;
              return;
            }
            stack.pop();
            return;
          }
          stack.push(seg);
        });
        if (invalid) return '';
        return stack.join('/');
      }

      function resolveRepoPath(rawPath) {
        var path = String(rawPath || '').trim();
        if (!path) return '';
        if (path.startsWith('/')) return normalizeSegments(path);

        var baseDir = '';
        if (mdPath.indexOf('/') !== -1) {
          baseDir = mdPath.slice(0, mdPath.lastIndexOf('/') + 1);
        }
        return normalizeSegments(baseDir + path);
      }

      function isSafeUrl(url) {
        var value = String(url || '').trim();
        if (!value) return false;
        var compact = value.replace(/[\u0000-\u001F\u007F\s]+/g, '').toLowerCase();
        if (/^(javascript|data|vbscript):/.test(compact)) return false;
        if (value.startsWith('#')) return true;
        if (value.startsWith('//')) return false;
        if (/^(https?:|mailto:|tel:)/i.test(value)) return true;
        if (/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(value)) return false;
        return true;
      }

      function splitUrlParts(url) {
        var value = String(url || '');
        var idx = value.search(/[?#]/);
        if (idx === -1) return { path: value, suffix: '' };
        return {
          path: value.slice(0, idx),
          suffix: value.slice(idx),
        };
      }

      function resolveMarkdownUrl(rawUrl) {
        var value = String(rawUrl || '').trim();
        if (!isSafeUrl(value)) return '';
        if (
          value.startsWith('#') ||
          /^(https?:|mailto:|tel:)/i.test(value)
        ) {
          return value;
        }

        var parts = splitUrlParts(value);
        var resolvedPath = resolveRepoPath(parts.path);
        if (!resolvedPath) return '';
        return resolvedPath + parts.suffix;
      }

      function parseFrontmatter(text) {
        var meta = {};
        var match = text.match(/^---\s*\n([\s\S]*?)\n---\s*(?:\n|$)/);
        if (!match) return { meta: meta, body: text };

        match[1].split('\n').forEach(function (line) {
          var idx = line.indexOf(':');
          if (idx === -1) return;
          var key = line.slice(0, idx).trim();
          if (!key) return;
          var value = line.slice(idx + 1).trim().replace(/^['"]|['"]$/g, '');
          meta[key] = value;
        });

        return {
          meta: meta,
          body: text.slice(match[0].length),
        };
      }

      function parseInline(text) {
        return escapeHtml(text)
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/!\[([^\]]*)\]\(((?:\\.|[^)])+)\)/g, function (_, alt, rawUrl) {
            var textAlt = decodeEscapedText(alt);
            var safeUrl = resolveMarkdownUrl(decodeEscapedText(rawUrl));
            if (!safeUrl) return '![' + escapeHtml(textAlt) + '](' + escapeHtml(rawUrl) + ')';
            return '<img src="' + escapeHtml(safeUrl) + '" alt="' + escapeHtml(textAlt) + '" loading="lazy">';
          })
          .replace(/\[([^\]]*)\]\(((?:\\.|[^)])+)\)/g, function (_, label, rawUrl) {
            var safeUrl = resolveMarkdownUrl(decodeEscapedText(rawUrl));
            var textLabel = decodeEscapedText(label);
            if (!safeUrl) return '[' + escapeHtml(textLabel) + '](' + escapeHtml(rawUrl) + ')';

            var href = safeUrl;
            var hrefParts = splitUrlParts(href);
            var normalizedHrefPath = normalizePath(hrefParts.path);
            if (normalizedHrefPath.endsWith('.md') && isAllowedPath(normalizedHrefPath)) {
              href = 'page.html?path=' + encodeURIComponent(normalizedHrefPath) + hrefParts.suffix;
            }

            var isExternal = /^https?:\/\//i.test(href);
            var attrs = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
            return '<a href="' + escapeHtml(href) + '"' + attrs + '>' + escapeHtml(textLabel) + '</a>';
          })
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>');
      }

      function normalizeHeadingText(text) {
        return String(text || '').trim().replace(/\s+/g, ' ').toLowerCase();
      }

      function renderMarkdown(markdown, frontmatterTitle) {
        var lines = String(markdown || '').replace(/\r\n/g, '\n').split('\n');
        var normalizedTitle = normalizeHeadingText(frontmatterTitle);
        var leadingIndex = -1;
        var html = [];
        var paragraph = [];
        var inUl = false;
        var inOl = false;

        if (normalizedTitle) {
          for (var i = 0; i < lines.length; i += 1) {
            if (!lines[i].trim()) continue;
            leadingIndex = i;
            break;
          }

          if (leadingIndex > -1) {
            var leadingHeading = lines[leadingIndex].trim().match(/^#\s+(.+?)\s*#*\s*$/);
            if (leadingHeading && normalizeHeadingText(leadingHeading[1]) === normalizedTitle) {
              lines.splice(leadingIndex, 1);
            }
          }
        }

        function flushParagraph() {
          if (!paragraph.length) return;
          html.push('<p>' + parseInline(paragraph.join(' ')) + '</p>');
          paragraph = [];
        }

        function closeLists() {
          if (inUl) {
            html.push('</ul>');
            inUl = false;
          }
          if (inOl) {
            html.push('</ol>');
            inOl = false;
          }
        }

        lines.forEach(function (line) {
          var trimmed = line.trim();

          if (!trimmed) {
            flushParagraph();
            closeLists();
            return;
          }

          var heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            flushParagraph();
            closeLists();
            var level = heading[1].length;
            html.push('<h' + level + '>' + parseInline(heading[2]) + '</h' + level + '>');
            return;
          }

          var unordered = trimmed.match(/^[-*]\s+(.+)$/);
          if (unordered) {
            flushParagraph();
            if (inOl) {
              html.push('</ol>');
              inOl = false;
            }
            if (!inUl) {
              html.push('<ul>');
              inUl = true;
            }
            html.push('<li>' + parseInline(unordered[1]) + '</li>');
            return;
          }

          var ordered = trimmed.match(/^\d+\.\s+(.+)$/);
          if (ordered) {
            flushParagraph();
            if (inUl) {
              html.push('</ul>');
              inUl = false;
            }
            if (!inOl) {
              html.push('<ol>');
              inOl = true;
            }
            html.push('<li>' + parseInline(ordered[1]) + '</li>');
            return;
          }

          var quote = trimmed.match(/^>\s?(.+)$/);
          if (quote) {
            flushParagraph();
            closeLists();
            html.push('<blockquote>' + parseInline(quote[1]) + '</blockquote>');
            return;
          }

          paragraph.push(trimmed);
        });

        flushParagraph();
        closeLists();

        return html.join('\n');
      }

      function showError(message) {
        metaEl.textContent = 'Markdown Viewer';
        titleEl.textContent = 'Unable to open page';
        summaryEl.textContent = message;
        bodyEl.innerHTML = '<p class="text-muted">' + escapeHtml(message) + '</p>';
      }

      async function loadPage() {
        var params = new URLSearchParams(window.location.search);
        mdPath = normalizePath(decodePath(params.get('path')));

        if (!isAllowedPath(mdPath)) {
          showError('Invalid path. Only static-pages/*.md and modules/*.md are allowed.');
          return;
        }

        try {
          var res = await fetch(mdPath, { cache: 'no-store' });
          if (!res.ok) throw new Error('File could not be loaded.');
          var text = await res.text();
          var parsed = parseFrontmatter(text);
          var title = (parsed.meta.title || '').trim() || deriveTitleFromPath(mdPath);
          var summary = (parsed.meta.summary || parsed.meta.description || '').trim();
          var articleMeta = (parsed.meta.date || parsed.meta.year || '').trim();
          var author = (parsed.meta.author || '').trim();
          var format = (parsed.meta.format || '').trim().toLowerCase();
          var layout = (parsed.meta.layout || '').trim().toLowerCase();
          var openingImage = (parsed.meta.opening_image || '').trim();
          var openingAlt = (parsed.meta.opening_alt || '').trim();

          document.title = title + ' — VERBOTEN MEDIA';
          titleEl.textContent = title;
          summaryEl.textContent = summary;
          var metaLine = [author, articleMeta].filter(Boolean).join(' — ');
          metaEl.textContent = metaLine || mdPath;
          bodyEl.innerHTML = renderMarkdown(parsed.body || '', title);

          if (format === 'shortstory') {
            var articleEl = document.querySelector('.article');
            if (articleEl) {
              articleEl.classList.add('article--shortstory');
              if (layout === 'split' && openingImage) {
                var safeImgUrl = resolveMarkdownUrl(openingImage);
                if (safeImgUrl) {
                  articleEl.classList.add('article--split');
                  var headerImgEl = document.getElementById('article-header-image');
                  if (headerImgEl) {
                    headerImgEl.innerHTML = '<img src="' + escapeHtml(safeImgUrl) + '" alt="' + escapeHtml(openingAlt) + '" loading="lazy">';
                  }
                }
              }
            }
          }
        } catch (error) {
          showError('The requested markdown file could not be loaded.');
        }
      }

      loadPage();
    })();
  </script>
